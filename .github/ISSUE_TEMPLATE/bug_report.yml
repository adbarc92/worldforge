name: Bug report
description: Report a bug in WorldForge
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! The more detail you provide, the faster we can help.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the bug?
      placeholder: |
        1. Start WorldForge with `docker compose up -d`
        2. Upload a file via ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: WorldForge version
      description: Git SHA, tag, or "main"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true
  - type: input
    id: docker-version
    attributes:
      label: Docker version
      description: Output of `docker --version`
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: API logs, browser console, etc. Use fenced code blocks.
      render: shell
