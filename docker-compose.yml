version: '3.8'

services:
  app:
    build: .
    container_name: worldforge-app
    ports:
      - "8000:8000"  # FastAPI
      - "8501:8501"  # Streamlit
    environment:
      # LLM Provider
      - LLM_PROVIDER=${LLM_PROVIDER:-claude}

      # Claude API
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-3-5-sonnet-20241022}
      - CLAUDE_MAX_TOKENS=${CLAUDE_MAX_TOKENS:-4096}
      - CLAUDE_TEMPERATURE=${CLAUDE_TEMPERATURE:-0.0}

      # Ollama
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-mistral:7b-instruct}
      - OLLAMA_TEMPERATURE=${OLLAMA_TEMPERATURE:-0.0}

      # Database
      - DATABASE_URL=sqlite:////data/worldforge.db
      - CHROMADB_PATH=/data/chromadb

      # Embeddings
      - EMBEDDINGS_MODEL=${EMBEDDINGS_MODEL:-BAAI/bge-large-en-v1.5}
      - EMBEDDINGS_DEVICE=${EMBEDDINGS_DEVICE:-cpu}

      # Application
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=${ENVIRONMENT:-production}

      # API Settings
      - API_HOST=0.0.0.0
      - API_PORT=8000

      # Frontend
      - STREAMLIT_HOST=0.0.0.0
      - STREAMLIT_PORT=8501

      # Storage
      - DOCUMENTS_PATH=/data/documents
      - EXPORTS_PATH=/data/exports

      # Chunking
      - CHUNK_SIZE=${CHUNK_SIZE:-500}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-50}

      # Thresholds
      - SIMILARITY_THRESHOLD=${SIMILARITY_THRESHOLD:-0.85}
      - HIGH_CONFIDENCE_THRESHOLD=${HIGH_CONFIDENCE_THRESHOLD:-0.90}

    volumes:
      - ./data:/data
      - ./config:/app/config

    depends_on:
      - ollama

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  ollama:
    image: ollama/ollama:latest
    container_name: worldforge-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

    # Uncomment for GPU support
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  ollama_data:
    driver: local
